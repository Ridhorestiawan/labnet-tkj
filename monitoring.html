<!DOCTYPE html>
<html lang="id">

  <meta charset="UTF-8">

  <meta name="description" content="Monitoring Jaringan LabNet TKJ">
  <title>LabNet TKJ — Monitoring</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>

<header>
  <div class="nav-container">
    <div class="logo">Lab<span>Net</span></div>
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Beranda</a></li>
      <li><a href="tentang.html">Tentang</a></li>
      <li><a href="topologi.html">Topologi</a></li>
      <li><a href="perangkat.html">Perangkat</a></li>

      <li><a href="kontak.html">Kontak</a></li>
      <li><button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">&#9790;</button></li>
    </ul>
  </div>
</header>

<main>
  <h1 class="page-title fade-in">Monitoring Perangkat</h1>

  <div class="monitor-summary fade-in" id="summary">
    <div class="summary-item online">
      <div class="num" id="totalOnline">0</div>
      <div class="label">Online</div>
    </div>
    <div class="summary-item offline">
      <div class="num" id="totalOffline">0</div>
      <div class="label">Offline</div>
    </div>
    <div class="summary-item">
      <div class="num" id="totalAll">0</div>
      <div class="label">Total</div>
    </div>
  </div>

  <div class="chart-wrapper fade-in">
    <h3>Riwayat Online / Offline (10 detik terakhir)</h3>
    <canvas id="chartCanvas"></canvas>
  </div>

  <div id="status" class="pc-list"></div>
</main>

<footer>
  &copy; 2026 LabNet TKJ &mdash; <span>Teknik Komputer dan Jaringan</span>
</footer>

<button class="back-to-top" id="backToTop" aria-label="Back to top">&uarr;</button>
